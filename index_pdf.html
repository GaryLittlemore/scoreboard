<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Scoreboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1f3a;
    color: white;
    text-align: center;
    margin: 0;
    padding: 15px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1 { font-size: 24px; }

.teams {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.team {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input {
    font-size: 18px;
    padding: 5px;
    width: 45%;
    text-align: center;
}

.score {
    font-size: 36px;
    width: 50px;
}

.buttons {
    margin: 15px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    font-size: 18px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #1e90ff;
    color: white;
}

button:active { background: #0f5ec7; }

.timer {
    font-size: 48px;
    margin: 10px 0;
}

.half {
    font-size: 20px;
    margin-bottom: 10px;
}

.controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.controls button { width: 100%; }

.log {
    margin-top: 20px;
    text-align: left;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.log-entry {
    font-size: 16px;
    margin: 5px 0;
}

@media(min-width: 600px) {
    .teams { flex-direction: row; }
    .team { width: 48%; }
    button { width: auto; }
    .controls button { width: auto; }
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ Scoreboard</h1>

<div class="half" id="halfDisplay">1st Half</div>

<div class="teams">
    <div class="team">
        <input id="homeName" value="Home">
        <div class="score" id="homeScore">0</div>
    </div>

    <div class="team">
        <input id="awayName" value="Away">
        <div class="score" id="awayScore">0</div>
    </div>
</div>

<div class="buttons">
    <button onclick="addGoal('home')">Home Goal</button>
    <button onclick="addGoal('away')">Away Goal</button>
    <button onclick="removeGoal('home')">Home -1</button>
    <button onclick="removeGoal('away')">Away -1</button>

    <button onclick="addEvent('home','YC')">YC</button>
    <button onclick="addEvent('away','YC')">YC</button>

    <button onclick="addEvent('home','RC')">RC</button>
    <button onclick="addEvent('away','RC')">RC</button>

    <button onclick="addEvent('home','Sub')">Sub</button>
    <button onclick="addEvent('away','Sub')">Sub</button>
</div>

<div class="timer" id="timer">00:00</div>

<div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetMatch()">Reset</button>
    <button onclick="startSecondHalf()">2nd Half</button>
</div>

<div style="margin-top: 10px;">
    <input id="customEvent" placeholder="Enter ..." style="width: 65%;">
    <button onclick="addCustomEvent()" style="width: 30%;">Add</button>
</div>

<div style="margin:10px 0;">
    <input id="competition" placeholder="Competition" style="width:45%;">
    <input id="venue" placeholder="Venue" style="width:45%;">
</div>

<div style="margin-top:10px;">
    <button onclick="exportPDF()">Export PDF</button>
</div>

<div class="log">
    <h3>Match Events Log</h3>
    <div id="log"></div>
</div>

</div>

<script>
let homeScore = 0, awayScore = 0;
let startTime = null, elapsed = 0, timerInterval = null, currentHalf = 1;

/* ✅ FIXED ELEMENT REFERENCES */
const homeScoreEl = document.getElementById('homeScore');
const awayScoreEl = document.getElementById('awayScore');
const timerEl = document.getElementById('timer');
const logEl = document.getElementById('log');
const homeNameEl = document.getElementById('homeName');
const awayNameEl = document.getElementById('awayName');
const halfDisplayEl = document.getElementById('halfDisplay');
const customEventEl = document.getElementById('customEvent');

function formatTime(sec){
    let m=Math.floor(sec/60), s=sec%60;
    if(currentHalf===1){
        if(m<45) return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
        if(sec===2700) return "45:00";
        return "45:00 +"+(Math.floor((sec-2700)/60)+1);
    }
    if(currentHalf===2){
        if(m<90) return String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
        if(sec===5400) return "90:00";
        return "90:00 +"+(Math.floor((sec-5400)/60)+1);
    }
}

function updateTimer(){
    if(!startTime) return;
    let sec=Math.floor((Date.now()-startTime+elapsed)/1000);
    timerEl.innerText=formatTime(sec);
}

function startTimer(){
    if(!timerInterval){
        startTime=Date.now();
        timerInterval=setInterval(updateTimer,1000);
    }
}

function stopTimer(){
    if(timerInterval){
        elapsed+=Date.now()-startTime;
        clearInterval(timerInterval);
        timerInterval=null;
        startTime=null;
    }
}

function resetMatch(){
    stopTimer();
    elapsed=0;homeScore=0;awayScore=0;currentHalf=1;
    timerEl.innerText="00:00";
    homeScoreEl.innerText=0;
    awayScoreEl.innerText=0;
    halfDisplayEl.innerText="1st Half";
    logEl.innerHTML="";
}

function startSecondHalf(){
    stopTimer();
    elapsed=2700000;
    currentHalf=2;
    timerEl.innerText="45:00";
    halfDisplayEl.innerText="2nd Half";
}

function getCurrentTime(){
    return Math.floor((elapsed+(startTime?Date.now()-startTime:0))/1000);
}

function addLog(t){
    let d=document.createElement("div");
    d.className="log-entry";
    d.innerText=t;
    logEl.appendChild(d);
}

function addGoal(t){
    let time=formatTime(getCurrentTime());
    let name=t==='home'?homeNameEl.value:awayNameEl.value;
    if(t==='home'){homeScore++;homeScoreEl.innerText=homeScore;}
    else{awayScore++;awayScoreEl.innerText=awayScore;}
    addLog(`${name} scored (${time})`);
}

function removeGoal(t){
    if(t==='home'&&homeScore>0){homeScore--;homeScoreEl.innerText=homeScore;}
    if(t==='away'&&awayScore>0){awayScore--;awayScoreEl.innerText=awayScore;}
}

function addEvent(t,i){
    let time=formatTime(getCurrentTime());
    let name=t==='home'?homeNameEl.value:awayNameEl.value;
    addLog(`${name} ${i} (${time})`);
}

function addCustomEvent(){
    if(customEventEl.value.trim()){
        addLog(customEventEl.value);
        customEventEl.value="";
    }
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    const doc=new jsPDF();

    let home=homeNameEl.value, away=awayNameEl.value;
    let comp=document.getElementById('competition').value||"-";
    let venue=document.getElementById('venue').value||"-";

    let w=doc.internal.pageSize.getWidth();

    doc.setFontSize(20);
    doc.text("MATCH REPORT",w/2,20,{align:"center"});
    doc.line(20,25,w-20,25);

    doc.setFontSize(12);
    doc.text("Date: "+new Date().toLocaleDateString(),20,35);
    doc.text("Competition: "+comp,20,42);
    doc.text("Venue: "+venue,20,49);

    doc.setFontSize(16);
    doc.text(`${home} ${homeScore} - ${awayScore} ${away}`,w/2,65,{align:"center"});
    doc.line(20,72,w-20,72);

    doc.setFontSize(14);
    doc.text("Match Events Log",20,85);

    let y=95;
    document.querySelectorAll(".log-entry").forEach(e=>{
        let lines=doc.splitTextToSize(e.innerText,170);
        if(y>270){doc.addPage();y=20;}
        doc.text(lines,20,y);
        y+=lines.length*6+2;
    });

    doc.save(`${home}_vs_${away}.pdf`);
}
</script>

</body>
</html>
