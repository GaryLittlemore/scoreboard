<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* -------------------- GLOBAL -------------------- */
body {
    font-family: Arial, sans-serif;
    background: #0b1f3a;
    color: white;
    text-align: center;
    margin: 0;
    padding: 15px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1 { font-size: 24px; }

/* -------------------- INPUTS -------------------- */
input {
    font-size: 18px;
    padding: 8px;
    width: 100%;
    border-radius: 6px;
    border: none;
    text-align: center;
}

/* -------------------- TEAMS -------------------- */
.teams {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.team {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.score {
    font-size: 36px;
    width: 60px;
    text-align: center;
}

/* -------------------- BUTTONS -------------------- */
button {
    font-size: 18px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #1e90ff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #3aa0ff;
}

button:active {
    background: #0f5ec7;
}

.buttons,
.controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 15px 0;
}

/* -------------------- TIMER -------------------- */
.timer {
    font-size: 48px;
    margin: 10px 0;
}

.half {
    font-size: 20px;
    margin-bottom: 10px;
}

/* -------------------- PANELS -------------------- */
.panel-row {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.log {
    margin-top: 20px;
    text-align: left;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.log-entry {
    font-size: 16px;
    margin: 5px 0;
}

.hidden {
    display: none !important;
}

/* -------------------- RESPONSIVE -------------------- */
@media (min-width: 600px) {
    .teams { flex-direction: row; }
    .team { width: 48%; }
}
</style>
</head>

<body>
<div class="container">

<h1>⚽ Scoreboard</h1>

<div class="half" id="halfDisplay">1st Half</div>

<!-- TEAMS -->
<div class="teams">
    <div class="team">
        <input id="homeName" value="Home">
        <div class="score" id="homeScore">0</div>
    </div>

    <div class="team">
        <input id="awayName" value="Away">
        <div class="score" id="awayScore">0</div>
    </div>
</div>

<!-- GOAL / CARD / SUB BUTTONS -->
<div class="buttons" id="buttonPanel">
    <button onclick="addGoal('home')">Home Goal</button>
    <button onclick="addGoal('away')">Away Goal</button>
    <button onclick="removeGoal('home')">Home -1</button>
    <button onclick="removeGoal('away')">Away -1</button>
    <button onclick="addEvent('home','YC')">YC</button>
    <button onclick="addEvent('away','YC')">YC</button>
    <button onclick="addEvent('home','RC')">RC</button>
    <button onclick="addEvent('away','RC')">RC</button>
    <button onclick="addEvent('home','Sub')">Sub</button>
    <button onclick="addEvent('away','Sub')">Sub</button>
</div>

<!-- CUSTOM EVENT -->
<div class="panel-row" id="eventPanel">
    <input id="customEvent" placeholder="Enter match event...">
    <button onclick="addCustomEvent()">Add</button>
</div>

<!-- TIMER -->
<div class="timer" id="timer">00:00</div>

<!-- TOGGLE -->
<button onclick="toggleControls()" id="toggleBtn">Hide Controls</button>

<!-- CONTROLS -->
<div class="controls" id="controlsPanel">
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetMatch()">Reset</button>
    <button onclick="startSecondHalf()">2nd Half</button>
</div>

<!-- DETAILS -->
<div class="panel-row" id="detailsPanel">
    <input id="competition" placeholder="Competition">
    <input id="venue" placeholder="Venue">
</div>

<!-- PDF EXPORT -->
<div id="pdfPanel">
    <button onclick="exportPDF()">Export PDF</button>
</div>

<!-- LOG -->
<div class="log" id="logPanel">
    <h3>Match Events Log</h3>
    <div id="log"></div>
</div>

</div>

<script>
/* JS unchanged except formatting */
let homeScore = 0, awayScore = 0;
let startTime = null, elapsed = 0, timerInterval = null, currentHalf = 1;
let controlsHidden = false;

const homeScoreEl = document.getElementById('homeScore');
const awayScoreEl = document.getElementById('awayScore');
const timerEl = document.getElementById('timer');
const logEl = document.getElementById('log');
const homeNameEl = document.getElementById('homeName');
const awayNameEl = document.getElementById('awayName');
const halfDisplayEl = document.getElementById('halfDisplay');
const customEventEl = document.getElementById('customEvent');

function toggleControls() {
    controlsHidden = !controlsHidden;

    ['buttonPanel','controlsPanel','eventPanel','detailsPanel','pdfPanel','logPanel']
        .forEach(id => document.getElementById(id).classList.toggle('hidden'));

    document.getElementById('toggleBtn').innerText =
        controlsHidden ? "Show Controls" : "Hide Controls";
}

function formatTime(sec) {
    let m = Math.floor(sec / 60), s = sec % 60;

    if (currentHalf === 1) {
        if (m < 45) return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (sec === 2700) return "45:00";
        return "45:00 +" + (Math.floor((sec - 2700) / 60) + 1);
    }

    if (currentHalf === 2) {
        if (m < 90) return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (sec === 5400) return "90:00";
        return "90:00 +" + (Math.floor((sec - 5400) / 60) + 1);
    }
}

function updateTimer() {
    if (!startTime) return;
    let sec = Math.floor((Date.now() - startTime + elapsed) / 1000);
    timerEl.innerText = formatTime(sec);
}

function startTimer() {
    if (!timerInterval) {
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
    }
}

function stopTimer() {
    if (timerInterval) {
        elapsed += Date.now() - startTime;
        clearInterval(timerInterval);
        timerInterval = null;
        startTime = null;
    }
}

function resetMatch() {
    stopTimer();
    elapsed = 0;
    homeScore = 0;
    awayScore = 0;
    currentHalf = 1;

    timerEl.innerText = "00:00";
    homeScoreEl.innerText = 0;
    awayScoreEl.innerText = 0;
    halfDisplayEl.innerText = "1st Half";
    logEl.innerHTML = "";
}

function startSecondHalf() {
    stopTimer();
    elapsed = 2700000;
    currentHalf = 2;
    timerEl.innerText = "45:00";
    halfDisplayEl.innerText = "2nd Half";
}

function getCurrentTime() {
    return Math.floor((elapsed + (startTime ? Date.now() - startTime : 0)) / 1000);
}

function addLog(text) {
    let entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerText = text;
    logEl.appendChild(entry);
}

function addGoal(team) {
    let time = formatTime(getCurrentTime());
    let name = team === 'home' ? homeNameEl.value : awayNameEl.value;

    if (team === 'home') {
        homeScore++;
        homeScoreEl.innerText = homeScore;
    } else {
        awayScore++;
        awayScoreEl.innerText = awayScore;
    }

    addLog(`${name} scored (${time})`);
}

function removeGoal(team) {
    if (team === 'home' && homeScore > 0) {
        homeScore--;
        homeScoreEl.innerText = homeScore;
    }
    if (team === 'away' && awayScore > 0) {
        awayScore--;
        awayScoreEl.innerText = awayScore;
    }
}

function addEvent(team, type) {
    let time = formatTime(getCurrentTime());
    let name = team === 'home' ? homeNameEl.value : awayNameEl.value;
    addLog(`${name} ${type} (${time})`);
}

function addCustomEvent() {
    if (customEventEl.value.trim()) {
        addLog(customEventEl.value);
        customEventEl.value = "";
    }
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let home = homeNameEl.value;
    let away = awayNameEl.value;
    let comp = document.getElementById('competition').value || "-";
    let venue = document.getElementById('venue').value || "-";
    let w = doc.internal.pageSize.getWidth();

    doc.setFontSize(20);
    doc.text("MATCH REPORT", w / 2, 20, { align: "center" });
    doc.line(20, 25, w - 20, 25);

    doc.setFontSize(12);
    doc.text("Date: " + new Date().toLocaleDateString(), 20, 35);
    doc.text("Competition: " + comp, 20, 42);
    doc.text("Venue: " + venue, 20, 49);

    doc.setFontSize(16);
    doc.text(`${home} ${homeScore} - ${awayScore} ${away}`, w / 2, 65, { align: "center" });
    doc.line(20, 72, w - 20, 72);

    doc.setFontSize(14);
    doc.text("Match Events Log", 20, 85);

    let y = 95;

    document.querySelectorAll(".log-entry").forEach(e => {
        let lines = doc.splitTextToSize(e.innerText, 170);

        if (y > 270) {
            doc.addPage();
            y = 20;
        }

        doc.text(lines, 20, y);
        y += lines.length * 6 + 2;
    });

    let pageCount = doc.getNumberOfPages();

    for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(9);

        doc.text("© Gary Littlemore", w / 2, 290, { align: "center" });
        doc.text(`Page ${i} of ${pageCount}`, w - 20, 290, { align: "right" });
    }

    doc.save(`${home} Vs ${away}.pdf`);
}
</script>

</body>
</html>
