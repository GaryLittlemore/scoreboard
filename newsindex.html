<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>External Website Viewer</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .topbar {
        background: #1f1f1f;
        padding: 15px;
        border-bottom: 2px solid #333;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    label {
        font-size: 18px;
        white-space: nowrap;
    }

    select {
        padding: 10px 14px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: #2e2e2e;
        color: white;
        cursor: pointer;
        min-width: 220px;
    }

    .viewer {
        flex: 1;
        width: 100%;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
    }

    .warning {
        padding: 10px 15px;
        background: #222;
        border-top: 1px solid #333;
        font-size: 14px;
        color: #aaa;
    }
</style>
</head>

<body>

<div class="topbar">
    <label for="pageSelect">Select Website:</label>

    <select id="pageSelect">
        <option value="https://example.com">Example</option>
        <option value="https://www.wikipedia.org">Wikipedia</option>
        <option value="https://www.reddit.com">Reddit</option>
    </select>
</div>

<div class="viewer">
    <iframe id="pageFrame" src="https://example.com"></iframe>
</div>

<div class="warning">
    Some websites block being displayed in iframes for security reasons.
</div>

<script>
    const pageSelect = document.getElementById('pageSelect');
    const pageFrame = document.getElementById('pageFrame');

    pageSelect.addEventListener('change', function () {
        pageFrame.src = this.value;
    });
</script>

</body>
</html>
