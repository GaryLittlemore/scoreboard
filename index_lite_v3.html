<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Scoreboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* -------------------- GLOBAL -------------------- */
body {
    font-family: Arial, sans-serif;
    background: #0b1f3a;
    color: white;
    text-align: center;
    margin: 0;
    padding: 15px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1 { font-size: 24px; }

/* -------------------- INPUTS -------------------- */
input {
    font-size: 18px;
    padding: 8px;
    width: 100%;
    border-radius: 6px;
    border: none;
    text-align: center;
}

/* -------------------- TEAMS -------------------- */
.teams {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.team {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.score {
    font-size: 36px;
    width: 60px;
    text-align: center;
}

/* -------------------- BUTTONS -------------------- */
button {
    font-size: 18px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #1e90ff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #3aa0ff;
}

button:active {
    background: #0f5ec7;
}

.buttons,
.controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 15px 0;
}

/* -------------------- TIMER -------------------- */
.timer {
    font-size: 48px;
    margin: 10px 0;
}

.half {
    font-size: 20px;
    margin-bottom: 10px;
}

/* -------------------- PANELS -------------------- */
.panel-row {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.log {
    margin-top: 20px;
    text-align: left;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.log-entry {
    font-size: 16px;
    margin: 5px 0;
}

.hidden {
    display: none !important;
}

/* -------------------- RESPONSIVE -------------------- */
@media (min-width: 600px) {
    .teams { flex-direction: row; }
    .team { width: 48%; }
}
</style>
</head>

<body>
<div class="container">

<h1>⚽ Scoreboard</h1>

<div class="half" id="halfDisplay">1st Half</div>

<!-- TEAMS -->
<div class="teams">
    <div class="team">
        <input id="homeName" value="Home">
        <div class="score" id="homeScore">0</div>
    </div>

    <div class="team">
        <input id="awayName" value="Away">
        <div class="score" id="awayScore">0</div>
    </div>
</div>

<!-- GOAL / CARD / SUB BUTTONS -->
<div class="buttons" id="buttonPanel">
    <button onclick="addGoal('home')">Home Goal</button>
    <button onclick="addGoal('away')">Away Goal</button>
    <button onclick="removeGoal('home')">Home -1</button>
    <button onclick="removeGoal('away')">Away -1</button>

    <button onclick="addEvent('home','🟨')">🟨</button>
    <button onclick="addEvent('away','🟨')">🟨</button>

    <button onclick="addEvent('home','🟥')">🟥</button>
    <button onclick="addEvent('away','🟥')">🟥</button>

    <button onclick="addEvent('home','🔁')">🔁</button>
    <button onclick="addEvent('away','🔁')">🔁</button>
</div>

<!-- CUSTOM EVENT -->
<div class="panel-row" id="eventPanel">
    <input id="customEvent" placeholder="Enter match event...">
    <button onclick="addCustomEvent()">Add</button>
</div>

<!-- TIMER -->
<div class="timer" id="timer">00:00</div>

<!-- TOGGLE -->
<button id="toggleBtn" onclick="toggleControls()">Hide Controls</button>

<!-- CONTROLS -->
<div class="controls" id="controlsPanel">
    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetMatch()">Reset</button>
    <button onclick="startSecondHalf()">2nd Half</button>
</div>

<!-- LOG -->
<div class="log" id="logPanel">
    <h3>Match Events Log</h3>
    <div id="log"></div>
</div>

</div>

<script>
let homeScore = 0;
let awayScore = 0;

let startTime = null;
let elapsed = 0;
let timerInterval = null;
let currentHalf = 1;

let controlsHidden = false;

function toggleControls() {
    controlsHidden = !controlsHidden;

    ['buttonPanel','controlsPanel','eventPanel','logPanel']
        .forEach(id => document.getElementById(id).classList.toggle('hidden'));

    document.getElementById('toggleBtn').innerText =
        controlsHidden ? "Show Controls" : "Hide Controls";
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;

    if (currentHalf === 1) {
        if (m < 45) return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (sec === 2700) return "45:00";
        return "45:00 +" + (Math.floor((sec - 2700) / 60) + 1);
    }

    if (currentHalf === 2) {
        if (m < 90) return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (sec === 5400) return "90:00";
        return "90:00 +" + (Math.floor((sec - 5400) / 60) + 1);
    }
}

function updateTimer() {
    if (!startTime) return;
    let sec = Math.floor((Date.now() - startTime + elapsed) / 1000);
    document.getElementById('timer').innerText = formatTime(sec);
}

function startTimer() {
    if (!timerInterval) {
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
    }
}

function stopTimer() {
    if (timerInterval) {
        elapsed += (Date.now() - startTime);
        clearInterval(timerInterval);
        timerInterval = null;
        startTime = null;
    }
}

function resetMatch() {
    stopTimer();
    elapsed = 0;
    homeScore = 0;
    awayScore = 0;
    currentHalf = 1;

    document.getElementById('timer').innerText = "00:00";
    document.getElementById('homeScore').innerText = "0";
    document.getElementById('awayScore').innerText = "0";
    document.getElementById('halfDisplay').innerText = "1st Half";
    document.getElementById('log').innerHTML = "";
}

function startSecondHalf() {
    stopTimer();
    elapsed = 2700000;
    currentHalf = 2;

    document.getElementById('timer').innerText = "45:00";
    document.getElementById('halfDisplay').innerText = "2nd Half";
}

function getCurrentTime() {
    return Math.floor((elapsed + (startTime ? Date.now() - startTime : 0)) / 1000);
}

function addGoal(team) {
    let time = formatTime(getCurrentTime());
    let name = team === 'home'
        ? document.getElementById('homeName').value
        : document.getElementById('awayName').value;

    if (team === 'home') {
        homeScore++;
        document.getElementById('homeScore').innerText = homeScore;
    } else {
        awayScore++;
        document.getElementById('awayScore').innerText = awayScore;
    }

    let entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerText = `${name} scored (${time})`;

    document.getElementById('log').appendChild(entry);
}

function removeGoal(team) {
    if (team === 'home' && homeScore > 0) {
        homeScore--;
        document.getElementById('homeScore').innerText = homeScore;
    }
    if (team === 'away' && awayScore > 0) {
        awayScore--;
        document.getElementById('awayScore').innerText = awayScore;
    }
}

function addEvent(team, icon) {
    let time = formatTime(getCurrentTime());
    let name = team === 'home'
        ? document.getElementById('homeName').value
        : document.getElementById('awayName').value;

    let entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerText = `${name} ${icon} (${time})`;

    document.getElementById('log').appendChild(entry);
}

function addCustomEvent() {
    let input = document.getElementById('customEvent');
    let text = input.value.trim();
    if (!text) return;

    let entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerText = text;

    document.getElementById('log').appendChild(entry);
    input.value = "";
}
</script>

</body>
</html>
